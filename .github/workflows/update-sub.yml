name: Обновление подписки каждые 30 минут

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Скачать и очистить сервера
        run: |
          curl -L -o servers.txt "https://sub.obbhod.online/premium"
          # Удаляем все пустые строки
          sed -i '/^$/d' servers.txt
          # Удаляем BOM (невидимые символы)
          sed -i '1s/^\xEF\xBB\xBF//' servers.txt
          mv servers.txt subscription.txt

      - name: Сохранить
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscription.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Автообновление $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
