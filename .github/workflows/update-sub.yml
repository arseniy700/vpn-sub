name: Обновление подписки каждые 30 минут

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Создать base64 с названием
        run: |
          curl -L -o servers.txt "https://sub.obbhod.online/premium"
          (echo "#profile-title: 🆓MSC VPN🗽"; echo "") | cat - servers.txt > temp.txt
          base64 -w 0 temp.txt > subscription.txt
      - name: Сохранить
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscription.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "update $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
