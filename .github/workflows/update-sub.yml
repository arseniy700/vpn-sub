name: Обновление подписки каждые 30 минут

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Скачать сервера
        run: curl -L -o "🆓MSC VPN🗽.txt" "https://sub.obbhod.online/premium"
      - name: Сохранить
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "🆓MSC VPN🗽.txt"
          git diff --quiet && git diff --staged --quiet || git commit -m "update $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
