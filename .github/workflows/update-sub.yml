name: Обновление подписки каждые 30 минут

on:
  schedule:
    - cron: '*/30 * * * *'   # каждые 30 минут
  workflow_dispatch:          # чтобы можно было запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Скачать свежие сервера
        run: |
          curl -L -o subscription.txt "https://sub.obbhod.online/premium"

      - name: Сохранить изменения в репозиторий
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscription.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Автообновление подписки $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
