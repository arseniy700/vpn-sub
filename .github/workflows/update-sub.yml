name: Обновление подписки каждые 30 минут

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Создать base64 подписку с названием
        run: |
          # Скачиваем сервера
          curl -L -o servers.txt "https://sub.obbhod.online/premium"
          # Создаём временный файл с названием и серверами
          echo "#profile-title: 🆓MSC VPN🗽" > temp.txt
          echo "" >> temp.txt
          cat servers.txt >> temp.txt
          # Кодируем в base64 и добавляем префикс для Happ
          echo -n "data:application/vnd.nekobox;base64," > subscription.txt
          base64 -w 0 temp.txt >> subscription.txt

      - name: Сохранить изменения
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscription.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Автообновление $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
